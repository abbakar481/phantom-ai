<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Phantom</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👻</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .page-404 {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 24px;
    }
    .ghost-404 { font-size: 6rem; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .code-404 { font-size: 5rem; font-weight: 900; color: var(--text-dim); letter-spacing: -3px; }
    .msg-404 { color: var(--text-muted); font-size: 1.1rem; margin: 12px 0 32px; }
  </style>
</head>
<body>
  <div class="page-404">
    <div class="ghost-404">👻</div>
    <div class="code-404">404</div>
    <p class="msg-404">This page vanished into the ether.</p>
    <a href="index.html" class="btn btn-primary btn-lg">Go Home</a>
  </div>
</body>
</html>
