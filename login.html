<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Phantom</title>
  <meta name="theme-color" content="#09090b">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👻</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .auth-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative;
    }
    .auth-page::before {
      content: ''; position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .auth-card {
      width: 100%; max-width: 420px; padding: 40px;
      animation: fadeUp 0.5s ease;
    }
    .auth-logo {
      text-align: center; margin-bottom: 32px;
    }
    .auth-title {
      font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 6px;
    }
    .auth-subtitle {
      text-align: center; color: var(--text-dim); font-size: 0.92rem; margin-bottom: 28px;
    }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-form .btn { margin-top: 4px; }
    .auth-footer {
      text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-dim);
    }
    .auth-footer a { color: var(--accent); font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
    .social-login { display: flex; flex-direction: column; gap: 10px; }
    .btn-social {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px; border-radius: var(--radius-sm);
      background: var(--bg-input); border: 1px solid var(--border);
      font-size: 0.92rem; font-weight: 500; cursor: pointer;
      transition: all var(--transition); color: var(--text-secondary);
    }
    .btn-social:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
    .btn-social svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav">
    <a href="index.html" class="site-logo">phantom <span>ai</span></a>
    <div class="nav-links">
      <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="card auth-card">
      <div class="auth-logo">
        <span style="font-size:2.5rem">👻</span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Log in to your Phantom account</p>

      <div class="social-login">
        <button class="btn-social" onclick="Phantom.toast('Google OAuth coming soon!','info')">
          <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.97 10.97 0 0 0 1 12c0 1.78.42 3.46 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="btn-social" onclick="Phantom.toast('Apple OAuth coming soon!','info')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.11 4.45-3.74 4.25z"/></svg>
          Continue with Apple
        </button>
      </div>

      <div class="divider-text">or</div>

      <form class="auth-form" onsubmit="event.preventDefault(); if(Phantom.login(this.email.value, this.password.value)) Phantom.navigate('dashboard.html');">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <label class="checkbox-group"><input type="checkbox" checked> Remember me</label>
          <a href="#" style="font-size:0.85rem;color:var(--accent)" onclick="Phantom.toast('Password reset coming soon','info')">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Log In</button>
      </form>

      <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up free</a></p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
